global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: demo

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  - job_name: node_exporter
    static_configs:
      - targets: ["node_exporter:9100"]

  - job_name: alertmanager
    static_configs:
      - targets: ["alertmanager:9093"]
